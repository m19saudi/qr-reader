<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR & Barcode Scanner</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 30px;
  overflow-x: hidden;
}
header {
  width: 100%;
  background: linear-gradient(135deg,#6a0dad,#7d1eff);
  color: white;
  padding: 1.8rem 0;
  font-size: 1.8rem;
  text-align: center;
  user-select: none;
}

/* Container holding left panel + result panel */
#container {
  display: flex;
  max-width: 900px;
  width: 90vw;
  background: white;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  overflow: hidden;
  margin-top: 20px;
  transition: all 0.6s ease;
}

/* Left panel */
#content {
  flex: 1;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  transition: all 0.6s ease;
}

/* Left panel columns after scan */
#content.columns {
  flex-direction: row;
  gap: 1rem;
}

/* Left panel columns child */
.left-column, .right-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* Drag & Drop */
#file-drop {
  border: 2.5px dashed #6a0dad;
  border-radius: 12px;
  padding: 1.5rem;
  cursor: pointer;
  color: #6a0dad;
  font-weight: 700;
  font-size: 1.1rem;
  transition: all 0.3s;
  text-align: center;
}
#file-drop.hover, #file-drop:focus {
  background-color: #f0e6ff;
  border-color: #a56fff;
  outline: none;
}

/* Instructions */
#instructions {
  font-size: 1rem;
  color: #444;
}

/* Error / Success */
#error-message {
  min-height: 1.6em;
  font-weight: 600;
  font-size: 1rem;
  color: #333;
  word-break: break-word;
  user-select: text;
}
#error-message.success { color: #2e7d32; }
#error-message.error { color: #d32f2f; }

/* Camera preview */
#qr-reader {
  width: 100%;
  position: relative;
  padding-top: 100%; /* square */
  border-radius: 16px;
  overflow: hidden;
  background: black;
  box-shadow: 0 4px 15px rgba(106,13,173,0.3);
}
#qr-reader > canvas,
#qr-reader > video {
  position: absolute !important;
  top:0; left:0;
  width:100% !important;
  height:100% !important;
  object-fit: cover;
}

/* Button */
button {
  background-color: #6a0dad;
  border: none;
  color: white;
  padding: 0.9rem 2rem;
  font-size: 1.1rem;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  transition: all 0.3s;
}
button:hover, button:focus {
  background-color: #8a29ff;
  transform: scale(1.05);
  outline: none;
}

/* Result panel */
#result-popup {
  width: 320px;
  background: white;
  border-left: 2px solid #6a0dad;
  padding: 1.8rem 2rem;
  box-sizing: border-box;
  transform: translateX(100%);
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
#result-popup.visible { transform: translateX(0); }

#result-popup h2 {
  margin:0 0 0.6rem 0;
  font-size:1.4rem;
  color:#6a0dad;
}
#result-text { font-size:1rem; color:#222; word-break: break-word; white-space: pre-wrap; }
#result-text a { color:#6a0dad; text-decoration: underline; }

/* Responsive mobile: slide instead of stack */
@media (max-width:760px){
  #container { flex-direction: row; width:100vw; overflow-x:hidden; }
  #content.columns { flex-direction: row; gap:0.5rem; }
  #result-popup { position:absolute; right:0; top:0; height:100%; width:60%; max-width:280px; border-left:2px solid #6a0dad; z-index:10; }
  #container.slid { transform: translateX(-60%); }
}
</style>
</head>
<body>

<header>QR & Barcode Scanner</header>

<div id="container">
  <div id="content" role="main">
    <div class="left-column">
      <div id="qr-reader" aria-label="Camera preview"></div>
    </div>
    <div class="right-column">
      <div id="file-drop" tabindex="0" role="button">Drag & drop an image here or click to select</div>
      <div id="instructions">Allow camera access and point to a QR code or barcode, or drag/drop an image above.</div>
      <div id="error-message" aria-live="polite"></div>
      <button id="start-camera">Start Camera</button>
    </div>
  </div>

  <div id="result-popup" role="alert" aria-live="polite">
    <h2>Result</h2>
    <div id="result-text">No result yet.</div>
  </div>
</div>

<script src="html5-qrcode.min.js"></script>
<script>
const errorMessage = document.getElementById('error-message');
const startCameraBtn = document.getElementById('start-camera');
const fileDrop = document.getElementById('file-drop');
const qrReaderContainer = document.getElementById('qr-reader');
const resultPopup = document.getElementById('result-popup');
const resultText = document.getElementById('result-text');
const container = document.getElementById('container');
const content = document.getElementById('content');

let html5QrCode = null;
let cameraRunning = false;

function isValidUrl(str){try{const url=new URL(str);return url.protocol==="http:"||url.protocol==="https:";}catch{return false;}}

function showResult(text){
  if(isValidUrl(text)) resultText.innerHTML=`<a href="${text}" target="_blank" rel="noopener noreferrer">${text}</a>`;
  else resultText.textContent=text;

  if(!resultPopup.classList.contains('visible')){
    resultPopup.classList.add('visible');
    container.classList.add('slid');
    content.classList.add('columns'); // split left panel into columns
  }
}

async function startCamera(){
  startCameraBtn.disabled=true;
  errorMessage.textContent="Starting camera...";
  try{
    html5QrCode=new Html5Qrcode("qr-reader");
    const devices = await Html5Qrcode.getCameras();
    if(devices && devices.length){
      let rearCamera = devices.find(d=>/back|rear|environment/i.test(d.label));
      const cameraId = rearCamera ? rearCamera.id : devices[0].id;
      await html5QrCode.start(cameraId,{fps:10, qrbox:250}, qrCodeMessage=>{
        errorMessage.textContent="";
        showResult(qrCodeMessage);
      }, err=>{});
      cameraRunning=true;
      startCameraBtn.textContent="Stop Camera";
      errorMessage.textContent="Camera started. Point to a QR code.";
    } else { errorMessage.textContent="No cameras found."; errorMessage.classList.add('error'); }
  }catch(err){errorMessage.textContent="Camera error: "+err.message; errorMessage.classList.add('error');}
  startCameraBtn.disabled=false;
}

async function stopCamera(){
  if(html5QrCode){
    try{
      await html5QrCode.stop();
      html5QrCode.clear();
      cameraRunning=false;
      startCameraBtn.textContent="Start Camera";
      errorMessage.textContent="Camera stopped.";
    }catch(e){errorMessage.textContent="Error stopping camera: "+e; errorMessage.classList.add('error');}
  }
}

startCameraBtn.addEventListener('click', async ()=>{
  if(cameraRunning) await stopCamera(); else await startCamera();
});

// Drag & Drop + click
fileDrop.addEventListener('dragover', e=>{e.preventDefault(); fileDrop.classList.add('hover');});
fileDrop.addEventListener('dragleave', e=>{e.preventDefault(); fileDrop.classList.remove('hover');});
fileDrop.addEventListener('drop', e=>{e.preventDefault(); fileDrop.classList.remove('hover'); if(e.dataTransfer.files.length>0) decodeFile(e.dataTransfer.files[0]);});
fileDrop.addEventListener('click', ()=>{
  const tempInput = document.createElement('input');
  tempInput.type='file'; tempInput.accept='image/*'; tempInput.style.display='none';
  document.body.appendChild(tempInput);
  tempInput.addEventListener('change', ()=>{ if(tempInput.files.length>0) decodeFile(tempInput.files[0]); document.body.removeChild(tempInput); });
  tempInput.click();
});
fileDrop.addEventListener('keydown', e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault(); fileDrop.click();}});

function decodeFile(file){
  errorMessage.textContent="Scanning image...";
  errorMessage.classList.remove('error','success');
  if(cameraRunning) stopCamera();
  const reader = new FileReader();
  reader.onload=()=>{
    if(!html5QrCode) html5QrCode=new Html5Qrcode("qr-reader");
    html5QrCode.scanFile(reader.result,true)
    .then(result=>{
      errorMessage.textContent="";
      errorMessage.classList.add('success');
      showResult(result);
    })
    .catch(()=>{errorMessage.textContent="No QR code found in the image."; errorMessage.classList.add('error');});
  };
  reader.readAsDataURL(file);
}
</script>

</body>
</html>
