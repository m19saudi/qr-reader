<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR & Barcode Scanner</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      text-align: center;
    }
    header {
      background: #6a0dad;
      color: white;
      padding: 1.5rem 0;
      font-size: 1.5rem;
    }
    #content {
      margin: 2rem auto;
      max-width: 400px;
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    #error-message {
      margin-bottom: 1rem;
      color: #333;
      font-weight: 500;
      min-height: 1.5em;
      word-break: break-word;
    }
    #file-drop {
      border: 2px dashed #6a0dad;
      border-radius: 8px;
      padding: 1rem;
      cursor: pointer;
      margin-bottom: 1rem;
      user-select: none;
      color: #6a0dad;
      font-weight: 600;
      transition: background-color 0.3s, border-color 0.3s;
    }
    #file-drop.hover {
      background-color: #f0e6ff;
      border-color: #a56fff;
    }
    #file-input {
      display: none;
    }
    button {
      background-color: #6a0dad;
      border: none;
      color: white;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s;
      margin-bottom: 1rem;
      user-select: none;
    }
    button:hover {
      background-color: #8a29ff;
    }
    #qr-reader {
      width: 100%;
      max-width: 400px;
      margin: 0 auto 1rem auto;
      border-radius: 8px;
      overflow: hidden;
      background: black;
    }
  </style>
</head>
<body>

<header>QR & Barcode Scanner</header>

<div id="content">
  <div id="error-message">Camera error: Permission dismissed</div>

  <div id="qr-reader"></div>
  <button id="start-camera">Start Camera</button>

  <div id="file-drop" tabindex="0" role="button" aria-label="Drag and drop an image here or click to select file">Drag & drop an image here or click to select</div>
  <input type="file" id="file-input" accept="image/*" />
</div>

<!-- Use local script: -->
<script src="html5-qrcode.min.js"></script>

<script>
  const errorMessage = document.getElementById('error-message');
  const startCameraBtn = document.getElementById('start-camera');
  const fileDrop = document.getElementById('file-drop');
  const fileInput = document.getElementById('file-input');
  const qrReaderContainer = document.getElementById('qr-reader');

  let html5QrCode = null;
  let cameraRunning = false;

  // Start or stop camera scanning
  startCameraBtn.addEventListener('click', async () => {
    if(cameraRunning) {
      await stopCamera();
      return;
    }
    startCameraBtn.disabled = true;
    errorMessage.textContent = "Starting camera...";
    try {
      html5QrCode = new Html5Qrcode("qr-reader");
      const devices = await Html5Qrcode.getCameras();
      if(devices && devices.length) {
        const cameraId = devices[0].id;
        await html5QrCode.start(
          cameraId,
          { fps: 10, qrbox: 250 },
          qrCodeMessage => {
            errorMessage.textContent = `Result: ${qrCodeMessage}`;
          },
          errorMessage => {
            // Optional: console.log("Scan error", errorMessage);
          }
        );
        cameraRunning = true;
        startCameraBtn.textContent = "Stop Camera";
        errorMessage.textContent = "Camera started. Point to a QR code.";
      } else {
        errorMessage.textContent = "No cameras found.";
      }
    } catch(err) {
      errorMessage.textContent = "Camera error: " + err.message;
    }
    startCameraBtn.disabled = false;
  });

  async function stopCamera() {
    if(html5QrCode) {
      try {
        await html5QrCode.stop();
        html5QrCode.clear();
        cameraRunning = false;
        startCameraBtn.textContent = "Start Camera";
        errorMessage.textContent = "Camera stopped.";
      } catch (e) {
        errorMessage.textContent = "Error stopping camera: " + e;
      }
    }
  }

  // Drag and drop highlight
  fileDrop.addEventListener('dragover', e => {
    e.preventDefault();
    fileDrop.classList.add('hover');
  });
  fileDrop.addEventListener('dragleave', e => {
    e.preventDefault();
    fileDrop.classList.remove('hover');
  });
  fileDrop.addEventListener('drop', e => {
    e.preventDefault();
    fileDrop.classList.remove('hover');
    if(e.dataTransfer.files.length > 0) {
      decodeFile(e.dataTransfer.files[0]);
    }
  });

  // Click to open file dialog
  fileDrop.addEventListener('click', () => fileInput.click());
  fileDrop.addEventListener('keydown', e => {
    if(e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      fileInput.click();
    }
  });

  // File input selection
  fileInput.addEventListener('change', () => {
    if(fileInput.files.length > 0) {
      decodeFile(fileInput.files[0]);
    }
  });

  // Decode image file
  function decodeFile(file) {
    errorMessage.textContent = "Scanning image...";
    const reader = new FileReader();
    reader.onload = () => {
      html5QrCode.scanFile(reader.result, true)
      .then(result => {
        errorMessage.textContent = `Result: ${result}`;
      })
      .catch(() => {
        errorMessage.textContent = "No QR code found in the image.";
      });
    };
    reader.readAsDataURL(file);
  }
</script>

</body>
</html>
