<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickScan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
  --primary:#7b5cff;
  --bg:#f6f7fb;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  overflow-x:hidden; /* Prevent horizontal overflow */
}

/* Header */
header {
  background:linear-gradient(135deg,#7b5cff,#a18aff);
  color:white;
  padding:15px;
  text-align:center;
}

/* Layout */
.container {
  max-width:1100px;
  margin:auto;
  padding:10px;
}

.card {
  display:flex;
  flex-wrap:wrap;
  background:white;
  border-radius:16px;
  overflow:hidden;
  position:relative;
}

/* Camera */
#reader {
  flex:1 1 500px;
  min-height:300px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* Controls */
.controls {
  flex:1 1 300px;
  padding:15px;
  border-left:1px solid #eee;
}

/* Control row */
.control-row {
  display:flex;
  gap:10px;
}

/* Buttons */
button {
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.main-btn {
  flex:1;
  padding:12px;
  background:var(--primary);
  color:white;
  font-weight:bold;
}

.icon-btn {
  width:50px;
  height:50px;
  font-size:20px;
  background:#eee;
}

/* Upload */
.upload {
  border:2px dashed #ccc;
  padding:15px;
  text-align:center;
  border-radius:12px;
  margin-top:15px;
  cursor:pointer;
}

/* History */
.history {
  margin-top:15px;
  max-height:200px;
  overflow:auto;
  font-size:13px;
}

.history div {
  padding:6px;
  border-bottom:1px solid #eee;
}

/* Result Panel */
.result-panel {
  position:absolute;
  right:-100%;
  top:0;
  width:100%;
  max-width:350px;
  height:100%;
  background:white;
  padding:20px;
  transition:0.4s;
  z-index:20;
}

.result-panel.active {
  right:0;
}

/* Mobile */
@media(max-width:768px){
  .card { flex-direction:column; }
  .controls { border-left:none; border-top:1px solid #eee; }
  
  .result-panel {
    top:auto;
    bottom:-100%;
    left:0;
    right:0;
    width:100%;
    max-width:none;
    height:60%;
    border-radius:20px 20px 0 0;
  }

  .result-panel.active {
    bottom:0;
  }

  .icon-btn { width:55px; height:55px; font-size:22px; }
  .main-btn { padding:14px; font-size:16px; }
}
</style>
</head>

<body>

<header>QuickScan</header>

<div class="container">
  <div class="card">

    <div id="reader"></div>

    <div class="controls">

      <div class="control-row">
        <button id="toggleBtn" class="main-btn">Start Camera</button>
        <button id="flashBtn" class="icon-btn">🔦</button>
        <button id="vibBtn" class="icon-btn">🔇</button>
      </div>

      <div class="upload" id="uploadBox">
        Upload / Drop Image
        <input type="file" id="fileInput" hidden>
      </div>

      <div class="history" id="history"></div>

    </div>

    <!-- Result -->
    <div class="result-panel" id="resultPanel">
      <h3>Result</h3>
      <div id="resultText"></div>
      <button id="copyBtn">Copy</button>
      <button id="scanAgainBtn">Scan Again</button>
    </div>

  </div>
</div>

<script>
let scanner=null;
let running=false;
let flashOn=false;
let lock=false;
let history=[];

const beep=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// Three-state vibration/sound button: 0=Mute,1=Vibration,2=Sound+Vibration
let vibState=0;
const toggleBtn=document.getElementById("toggleBtn");
const flashBtn=document.getElementById("flashBtn");
const vibBtn=document.getElementById("vibBtn");
const resultPanel=document.getElementById("resultPanel");
const resultText=document.getElementById("resultText");
const historyEl=document.getElementById("history");

function updateVibBtn(){
  switch(vibState){
    case 0: vibBtn.textContent="🔇"; break;
    case 1: vibBtn.textContent="📳"; break;
    case 2: vibBtn.textContent="🔊"; break;
  }
}

/* URL check */
function isURL(t){ return /^https?:\/\//i.test(t); }

/* Render history */
function renderHistory(){
  historyEl.innerHTML=history.slice(0,10).map(i=>`<div>${i}</div>`).join("");
}

/* Show scan result */
function showResult(text){
  if(lock) return;
  lock=true;

  // Handle vibration
  if(vibState===1 || vibState===2){
    if(navigator.vibrate){ navigator.vibrate(100); }
  }

  // Handle sound
  if(vibState===2){ beep.play(); }

  resultText.innerHTML=isURL(text) ? `<a href="${text}" target="_blank">${text}</a>` : text;

  resultPanel.classList.add("active");

  history.unshift(text);
  renderHistory();

  setTimeout(()=>lock=false,1500);
}

/* Toggle camera start/stop */
toggleBtn.onclick=async()=>{
  if(!running){
    try{
      scanner=new Html5Qrcode("reader");
      const cams=await Html5Qrcode.getCameras();
      const cam=cams.find(c=>c.label.toLowerCase().includes("back"))||cams[0];

      await scanner.start(cam.id,{fps:10,qrbox:250},showResult);
      running=true;
      toggleBtn.textContent="Stop Camera";
    }catch{
      alert("Camera error");
    }
  }else{
    await scanner.stop();
    scanner.clear();
    running=false;
    toggleBtn.textContent="Start Camera";
  }
};

/* Flash */
flashBtn.onclick=async()=>{
  if(!scanner) return;
  try{
    flashOn=!flashOn;
    await scanner.applyVideoConstraints({advanced:[{torch:flashOn}]});
  }catch{ alert("Flash not supported"); }
};

/* Vibration/Sound toggle */
vibBtn.onclick=()=>{
  vibState=(vibState+1)%3;
  updateVibBtn();
};

/* Scan Again */
scanAgainBtn.onclick=()=>{ resultPanel.classList.remove("active"); };

/* Upload / drag & drop */
uploadBox.onclick=()=>fileInput.click();
fileInput.onchange=async(e)=>{
  const file=e.target.files[0];
  if(!file) return;
  try{
    const html5Qr=new Html5Qrcode("reader");
    const res=await html5Qr.scanFile(file,true);
    showResult(res);
  }catch{ alert("No code found"); }
};
uploadBox.ondragover=e=>e.preventDefault();
uploadBox.ondrop=async e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  try{
    const html5Qr=new Html5Qrcode("reader");
    const res=await html5Qr.scanFile(file,true);
    showResult(res);
  }catch{ alert("Invalid image"); }
};

/* Copy result */
copyBtn.onclick=()=>{ navigator.clipboard.writeText(resultText.innerText); };
</script>

</body>
</html>
