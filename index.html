<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuickScan - QR & Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
  --primary: #7b5cff;
  --secondary: #a18aff;
  --bg: #f6f7fb;
  --text: #333;
  --card: #ffffff;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
}

/* Header */
header {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  padding: 20px;
  text-align: center;
  font-weight: bold;
}

/* Layout */
.container {
  max-width: 1100px;
  margin: 20px auto;
  padding: 10px;
}

.card {
  display: flex;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  position: relative;
}

#reader {
  flex: 1;
  min-height: 320px;
  position: relative;
}

.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 70%;
  height: 60%;
  transform: translate(-50%, -50%);
  border: 2px dashed rgba(255,255,255,0.7);
  border-radius: 12px;
}

.controls {
  width: 350px;
  padding: 20px;
  border-left: 1px solid #eee;
}

button {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  cursor: pointer;
}

button.secondary {
  background: #eee;
  color: #333;
}

.upload {
  border: 2px dashed #ccc;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  margin-top: 15px;
}

.status {
  margin-top: 10px;
  font-size: 13px;
}

.history {
  margin-top: 15px;
  max-height: 200px;
  overflow-y: auto;
  font-size: 13px;
}

.history div {
  padding: 5px;
  border-bottom: 1px solid #eee;
}

/* Result panel */
.result-panel {
  position: absolute;
  right: -400px;
  top: 0;
  width: 350px;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.4s;
}

.result-panel.active {
  right: 0;
}

@media(max-width:768px){
  .card { flex-direction: column; }
  .controls { width: 100%; }
  .result-panel { width: 100%; }
}
</style>
</head>

<body>

<header>QuickScan - QR & Barcode Scanner</header>

<div class="container">
  <div class="card">

    <div id="reader">
      <div class="overlay"></div>
    </div>

    <div class="controls">
      <button id="startBtn">Start Camera</button>
      <button id="stopBtn" class="secondary">Stop</button>
      <button id="flashBtn" class="secondary">Flash</button>
      <button id="soundBtn" class="secondary">🔇 Sound Off</button>

      <div class="upload" tabindex="0" id="uploadBox">
        Click or Drop Image
        <input type="file" id="fileInput" hidden>
      </div>

      <div class="status" id="status">Idle</div>

      <div class="history" id="history"></div>
    </div>

    <div class="result-panel" id="resultPanel">
      <h3>Result</h3>
      <div id="resultText"></div>
      <button id="copyBtn">Copy</button>
      <button id="scanAgainBtn">Scan Again</button>
    </div>

  </div>
</div>

<script>
let scanner = null;
let isRunning = false;
let historyList = [];
let flashOn = false;
let soundEnabled = false; // START MUTED
let scanLock = false;

const statusEl = document.getElementById("status");
const resultPanel = document.getElementById("resultPanel");
const resultText = document.getElementById("resultText");
const historyEl = document.getElementById("history");
const soundBtn = document.getElementById("soundBtn");

const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

/* URL check */
function isURL(text) {
  return /^https?:\/\//i.test(text);
}

/* Show result */
function showResult(text) {
  if (scanLock) return;
  scanLock = true;

  if (soundEnabled) beep.play();

  if (isURL(text)) {
    resultText.innerHTML = `<a href="${text}" target="_blank">${text}</a>`;
  } else {
    resultText.textContent = text;
  }

  resultPanel.classList.add("active");

  historyList.unshift(text);
  renderHistory();

  setTimeout(() => {
    scanLock = false;
  }, 1500);
}

/* History */
function renderHistory() {
  historyEl.innerHTML = historyList
    .slice(0,10)
    .map(i => `<div>${i}</div>`)
    .join("");
}

/* Start */
async function startScanner() {
  if (isRunning) return;

  try {
    scanner = new Html5Qrcode("reader");

    const devices = await Html5Qrcode.getCameras();
    const cam = devices.find(d => d.label.toLowerCase().includes("back")) || devices[0];

    await scanner.start(cam.id, { fps: 10, qrbox: 250 },
      (decoded) => showResult(decoded)
    );

    isRunning = true;
    statusEl.textContent = "Scanning...";
  } catch (err) {
    statusEl.textContent = "Camera error";
  }
}

/* Stop */
async function stopScanner() {
  if (!scanner || !isRunning) return;

  await scanner.stop();
  scanner.clear();
  isRunning = false;
  statusEl.textContent = "Stopped";
}

/* Flash */
async function toggleFlash() {
  if (!scanner) return;

  try {
    flashOn = !flashOn;
    await scanner.applyVideoConstraints({
      advanced: [{ torch: flashOn }]
    });
  } catch {
    alert("Flash not supported");
  }
}

/* Upload */
fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const html5Qr = new Html5Qrcode("reader");
    const result = await html5Qr.scanFile(file, true);
    showResult(result);
  } catch {
    statusEl.textContent = "No QR found";
  }
};

/* Drag */
uploadBox.onclick = () => fileInput.click();
uploadBox.ondragover = e => e.preventDefault();

uploadBox.ondrop = async (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];

  try {
    const html5Qr = new Html5Qrcode("reader");
    const result = await html5Qr.scanFile(file, true);
    showResult(result);
  } catch {
    statusEl.textContent = "Invalid image";
  }
};

/* Copy */
copyBtn.onclick = () => {
  navigator.clipboard.writeText(resultText.innerText);
};

/* Scan Again */
scanAgainBtn.onclick = () => {
  resultPanel.classList.remove("active");
};

/* Sound toggle */
soundBtn.onclick = () => {
  soundEnabled = !soundEnabled;
  soundBtn.textContent = soundEnabled ? "🔊 Sound On" : "🔇 Sound Off";
};

/* Buttons */
startBtn.onclick = startScanner;
stopBtn.onclick = stopScanner;
flashBtn.onclick = toggleFlash;

</script>

</body>
</html>
