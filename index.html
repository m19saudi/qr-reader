<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR & Barcode Scanner</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  align-items: center;
  justify-content: flex-start;
  padding-top: 30px;
}
header {
  width: 100%;
  background: linear-gradient(135deg, #6a0dad, #7d1eff);
  color: white;
  padding: 1.8rem 0;
  font-size: 1.8rem;
  text-align: center;
  user-select: none;
}
#content {
  background: white;
  width: 400px;
  height: 400px; /* fixed square */
  padding: 1rem;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  margin-top: 20px;
}
#file-drop {
  border: 2.5px dashed #6a0dad;
  border-radius: 12px;
  padding: 0.8rem;
  cursor: pointer;
  color: #6a0dad;
  font-weight: 700;
  font-size: 1.1rem;
  transition: background-color 0.3s, border-color 0.3s;
  user-select: none;
  margin-bottom: 1rem;
  width: 90%;
}
#file-drop.hover,
#file-drop:focus {
  background-color: #f0e6ff;
  border-color: #a56fff;
  outline: none;
}
#instructions {
  font-size: 0.9rem;
  color: #444;
  margin-bottom: 0.5rem;
}
#error-message {
  min-height: 1.4em;
  margin-bottom: 0.5rem;
  font-weight: 600;
  font-size: 0.95rem;
  color: #333;
  word-break: break-word;
  user-select: text;
}
#error-message.success { color: #2e7d32; }
#error-message.error { color: #d32f2f; }
#qr-reader {
  width: 90%;
  height: 180px;
  margin-bottom: 0.8rem;
  border-radius: 12px;
  overflow: hidden;
  background: black;
  box-shadow: 0 4px 15px rgba(106,13,173,0.3);
}
#qr-reader.active { box-shadow: 0 0 20px 4px #6a0dad; }
button {
  background-color: #6a0dad;
  border: none;
  color: white;
  padding: 0.6rem 1.5rem;
  font-size: 1rem;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  transition: all 0.3s;
}
button:hover,
button:focus {
  background-color: #8a29ff;
  transform: scale(1.05);
  outline: none;
}
@media (max-width: 480px) {
  #content {
    width: 90vw;
    height: auto;
    padding: 1rem;
  }
  #qr-reader {
    height: 150px;
  }
}
</style>
</head>
<body>

<header>QR & Barcode Scanner</header>

<div id="content" role="main">

  <div id="file-drop" tabindex="0" role="button" aria-label="Drag and drop an image here or click to select">
    Drag & drop an image here or click to select
  </div>

  <div id="instructions">Allow camera access and point your device to a QR or barcode. Or drag & drop an image with a code above.</div>

  <div id="error-message" aria-live="polite"></div>

  <div id="qr-reader" aria-label="Camera preview for QR code scanning"></div>
  <button id="start-camera" aria-pressed="false" aria-controls="qr-reader">Start Camera</button>

  <input type="file" id="file-input" accept="image/*" aria-hidden="true" />

</div>

<script src="html5-qrcode.min.js"></script>
<script>
const errorMessage = document.getElementById('error-message');
const startCameraBtn = document.getElementById('start-camera');
const fileDrop = document.getElementById('file-drop');
const fileInput = document.getElementById('file-input');
const qrReaderContainer = document.getElementById('qr-reader');

let html5QrCode = null;
let cameraRunning = false;

async function startCamera() {
  startCameraBtn.disabled = true;
  errorMessage.textContent = "Starting camera...";
  try {
    html5QrCode = new Html5Qrcode("qr-reader");
    const devices = await Html5Qrcode.getCameras();
    if (devices && devices.length) {
      let rearCamera = devices.find(device => /back|rear|environment/i.test(device.label));
      const cameraId = rearCamera ? rearCamera.id : devices[0].id;

      await html5QrCode.start(
        cameraId,
        { fps: 10, qrbox: 150 },
        qrCodeMessage => {
          errorMessage.textContent = `Result: ${qrCodeMessage}`;
          errorMessage.classList.remove('error');
          errorMessage.classList.add('success');
        },
        err => {}
      );
      cameraRunning = true;
      startCameraBtn.textContent = "Stop Camera";
      startCameraBtn.setAttribute('aria-pressed', 'true');
      errorMessage.textContent = "Camera started. Point to a QR code.";
      qrReaderContainer.classList.add('active');
    } else {
      errorMessage.textContent = "No cameras found.";
      errorMessage.classList.add('error');
    }
  } catch (err) {
    errorMessage.textContent = "Camera error: " + err.message;
    errorMessage.classList.add('error');
  }
  startCameraBtn.disabled = false;
}

async function stopCamera() {
  if (html5QrCode) {
    try {
      await html5QrCode.stop();
      html5QrCode.clear();
      cameraRunning = false;
      startCameraBtn.textContent = "Start Camera";
      startCameraBtn.setAttribute('aria-pressed', 'false');
      errorMessage.textContent = "Camera stopped.";
      qrReaderContainer.classList.remove('active');
    } catch (e) {
      errorMessage.textContent = "Error stopping camera: " + e;
      errorMessage.classList.add('error');
    }
  }
}

startCameraBtn.addEventListener('click', async () => {
  if (cameraRunning) {
    await stopCamera();
  } else {
    await startCamera();
  }
});

// Drag & Drop handlers
fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('hover'); });
fileDrop.addEventListener('dragleave', e => { e.preventDefault(); fileDrop.classList.remove('hover'); });
fileDrop.addEventListener('drop', e => {
  e.preventDefault();
  fileDrop.classList.remove('hover');
  if (e.dataTransfer.files.length > 0) decodeFile(e.dataTransfer.files[0]);
});

fileDrop.addEventListener('click', () => fileInput.click());
fileDrop.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); } });

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) decodeFile(fileInput.files[0]);
});

function decodeFile(file) {
  errorMessage.textContent = "Scanning image...";
  errorMessage.classList.remove('error', 'success');
  const reader = new FileReader();
  reader.onload = () => {
    if(!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.scanFile(reader.result, true)
      .then(result => {
        errorMessage.textContent = `Result: ${result}`;
        errorMessage.classList.add('success');
      })
      .catch(() => {
        errorMessage.textContent = "No QR code found in the image.";
        errorMessage.classList.add('error');
      });
  };
  reader.readAsDataURL(file);
}
</script>

</body>
</html>
