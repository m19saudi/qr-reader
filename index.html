<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline QR & Barcode Scanner</title>
<style>
  /* Reset and body */
  body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f7f9fc; color:#333; text-align:center; }
  header { background:#4a90e2; color:white; padding:20px; font-size:1.6em; font-weight:bold; }
  main { max-width:480px; margin: 20px auto; }
  
  /* Scanner container */
  #reader { width: 100%; border: 2px solid #4a90e2; border-radius:10px; margin:0 auto; }
  
  /* Result box */
  #result { background:white; border:1px solid #ccc; border-radius:8px; padding:10px 15px; margin-top:20px; font-size:1.1em; word-break:break-all; min-height:2em; }
  
  /* Buttons */
  .btn { padding:10px 20px; margin:10px 5px; border:none; border-radius:5px; cursor:pointer; font-size:1em; color:white; background:#4a90e2; }
  .btn:hover { background:#357ab8; }

  /* File input styling */
  input[type=file] { margin-top:10px; font-size:1em; }
</style>
</head>
<body>
<header>QR & Barcode Scanner</header>
<main>
  <div id="reader"></div>
  <div id="result">Scan a QR code or barcode to see the result here.</div>
  <input type="file" id="fileSelector" accept="image/*"><br>
  <button class="btn" onclick="stopScanner()">Stop Scanner</button>
  <button class="btn" onclick="restartScanner()">Restart Scanner</button>
</main>

<!-- Embedded html5-qrcode library -->
<script>
/* 
  Paste the full minified html5-qrcode library here.
  Download it from:
  https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js
  Then copy all of it between these <script> tags.
*/
</script>

<script>
const resultDiv = document.getElementById("result");
const fileSelector = document.getElementById("fileSelector");
let scanner;

// Function to start the camera scanner
function startScanner() {
  scanner = new Html5Qrcode("reader");
  Html5Qrcode.getCameras().then(cameras => {
    if (cameras && cameras.length) {
      scanner.start(
        cameras[0].id,
        { fps: 10, qrbox: 250 },
        decodedText => { resultDiv.textContent = "Scanned: " + decodedText; },
        error => { /* ignore minor scan errors */ }
      ).catch(err => { resultDiv.textContent = "Error starting camera: " + err; });
    } else {
      resultDiv.textContent = "No camera devices found.";
    }
  }).catch(err => { resultDiv.textContent = "Camera access error: " + err; });
}

// Stop camera scanning
function stopScanner() {
  if (scanner) {
    scanner.stop().then(() => {
      resultDiv.textContent = "Scanner stopped.";
    }).catch(err => { resultDiv.textContent = "Failed to stop scanner: " + err; });
  }
}

// Restart scanner
function restartScanner() {
  stopScanner();
  setTimeout(() => startScanner(), 500);
}

// File image scanning
fileSelector.addEventListener("change", event => {
  if (!event.target.files.length) return;
  const file = event.target.files[0];
  scanner.scanFile(file, true)
    .then(decodedText => { resultDiv.textContent = "Image scanned: " + decodedText; })
    .catch(err => { resultDiv.textContent = "Image scan failed: " + err; });
});

// Initialize scanner on page load
startScanner();
</script>
</body>
</html>
