<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuickScan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
  --primary: #7b5cff;
  --bg: #f6f7fb;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
}

/* Header */
header {
  background: linear-gradient(135deg, #7b5cff, #a18aff);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* Layout */
.container {
  max-width: 1100px;
  margin: 20px auto;
}

.card {
  display: flex;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}

/* Camera */
#reader {
  flex: 1;
  min-height: 300px;
  position: relative;
}

/* Controls */
.controls {
  width: 320px;
  padding: 20px;
  border-left: 1px solid #eee;
}

/* Control Row */
.control-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* Buttons */
button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.main-btn {
  flex: 1;
  background: var(--primary);
  color: white;
}

.icon-btn {
  width: 45px;
  height: 45px;
  background: #eee;
  font-size: 18px;
}

/* Upload */
.upload {
  border: 2px dashed #ccc;
  padding: 15px;
  text-align: center;
  border-radius: 12px;
  margin-top: 15px;
  cursor: pointer;
}

/* Result Panel */
.result-panel {
  position: absolute;
  right: -400px;
  top: 0;
  width: 350px;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.4s;
  z-index: 999;
}

.result-panel.active {
  right: 0;
}

/* Mobile Fix */
@media(max-width:768px){
  .card { flex-direction: column; }

  .controls { width: 100%; }

  .result-panel {
    width: 100%;
    height: 60%;
    bottom: -100%;
    top: auto;
    right: 0;
    border-radius: 20px 20px 0 0;
  }

  .result-panel.active {
    bottom: 0;
  }
}
</style>
</head>

<body>

<header>QuickScan</header>

<div class="container">
  <div class="card">

    <div id="reader"></div>

    <div class="controls">

      <!-- ONE LINE CONTROLS -->
      <div class="control-row">
        <button id="toggleCamera" class="main-btn">Start Camera</button>
        <button id="flashBtn" class="icon-btn">🔦</button>
        <button id="soundBtn" class="icon-btn">🔇</button>
      </div>

      <div class="upload" id="uploadBox">
        Upload / Drop Image
        <input type="file" id="fileInput" hidden>
      </div>

      <div id="status">Idle</div>
      <div id="history"></div>

    </div>

    <!-- Result Panel -->
    <div class="result-panel" id="resultPanel">
      <h3>Result</h3>
      <div id="resultText"></div>
      <button id="copyBtn">Copy</button>
      <button id="scanAgainBtn">Scan Again</button>
    </div>

  </div>
</div>

<script>
let scanner = null;
let running = false;
let flashOn = false;
let soundOn = false;
let lock = false;
let history = [];

const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

const toggleBtn = document.getElementById("toggleCamera");
const resultPanel = document.getElementById("resultPanel");
const resultText = document.getElementById("resultText");

/* URL */
function isURL(t){
  return /^https?:\/\//i.test(t);
}

/* Result */
function showResult(text){
  if(lock) return;
  lock = true;

  if(soundOn) beep.play();

  resultText.innerHTML = isURL(text)
    ? `<a href="${text}" target="_blank">${text}</a>`
    : text;

  resultPanel.classList.add("active");

  history.unshift(text);

  setTimeout(()=> lock = false, 1500);
}

/* Toggle Camera */
toggleBtn.onclick = async () => {
  if(!running){
    try {
      scanner = new Html5Qrcode("reader");

      const cams = await Html5Qrcode.getCameras();
      const cam = cams.find(c=>c.label.toLowerCase().includes("back")) || cams[0];

      await scanner.start(cam.id, { fps:10, qrbox:250 }, showResult);

      running = true;
      toggleBtn.textContent = "Stop Camera";

    } catch {
      alert("Camera error");
    }
  } else {
    await scanner.stop();
    scanner.clear();

    running = false;
    toggleBtn.textContent = "Start Camera";
  }
};

/* Flash */
flashBtn.onclick = async ()=>{
  if(!scanner) return;
  try {
    flashOn = !flashOn;
    await scanner.applyVideoConstraints({
      advanced:[{ torch: flashOn }]
    });
  } catch {
    alert("Flash not supported");
  }
};

/* Sound */
soundBtn.onclick = ()=>{
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? "🔊" : "🔇";
};

/* Scan Again */
scanAgainBtn.onclick = ()=>{
  resultPanel.classList.remove("active");
};

/* Upload */
uploadBox.onclick = ()=> fileInput.click();

fileInput.onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  try{
    const html5Qr = new Html5Qrcode("reader");
    const res = await html5Qr.scanFile(file,true);
    showResult(res);
  } catch {
    alert("No code found");
  }
};

/* Drag */
uploadBox.ondragover = e=> e.preventDefault();

uploadBox.ondrop = async e=>{
  e.preventDefault();
  const file = e.dataTransfer.files[0];

  try{
    const html5Qr = new Html5Qrcode("reader");
    const res = await html5Qr.scanFile(file,true);
    showResult(res);
  } catch {
    alert("Invalid image");
  }
};

/* Copy */
copyBtn.onclick = ()=>{
  navigator.clipboard.writeText(resultText.innerText);
};
</script>

</body>
</html>
